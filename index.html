<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 추천 사이트 - PLATE</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/index.css">
  <script>
    const savedTheme = localStorage.getItem('teamplay_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>

<body>

  <!-- 헤더 -->
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path d="M7 2v20"></path>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"></path>
        </svg>
        PLATE
      </a>
      <div class="nav">
        <a href="index.html">홈</a>
        <a href="list.html">맛집 찾기</a>
        <a href="bookmark.html">찜 목록</a>
        <button id="themeToggle" class="theme-toggle" aria-label="다크모드 전환">
          <svg id="themeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
            fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 슬라이드 (컨테이너 밖으로 빼서 꽉 차게) -->
  <div class="hero-slider">
    <div class="slides-wrapper" id="slidesWrapper"></div>
    <button class="slider-btn prev" id="sliderPrev">&lt;</button>
    <button class="slider-btn next" id="sliderNext">&gt;</button>
    <div class="slider-dots" id="sliderDots"></div>
  </div>

  <div class="container">
    <!-- 지역별 맛집 -->
    <div class="section">
      <h2 class="section-title">지도에서 지역 선택하기</h2>
      <p class="section-subtitle">어느 지역의 맛집을 찾고 싶으신가요?</p>
      <div class="region-grid" id="regionGrid"></div>
    </div>

    <!-- 랜덤 추천 -->
    <div class="random-section">
      <div class="random-inner">
        <h2 class="section-title">오늘 뭐 먹지?</h2>
        <p>선택하기 어렵다면 랜덤으로 맛집을 추천해 드립니다!</p>

        <div class="random-select-wrapper">
          <select id="randomRegionSelect" class="random-select">
            <option value="all">전국 전체</option>
            <option value="서울">서울</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="광주">광주</option>
            <option value="대전">대전</option>
            <option value="인천">인천</option>
            <option value="제주">제주</option>
          </select>
        </div>

        <button id="randomPickBtn" class="btn">랜덤으로 추천받기</button>
        <div id="randomResult" class="random-result"></div>
      </div>
    </div>

    <!-- 추천 맛집 -->
    <div class="section">
      <h2 class="section-title title-inline">요즘 뜨는 추천 맛집</h2>
      <a href="list.html" class="btn btn-float">전체보기 &gt;</a>
      <div class="clear-divider"></div>
      <div class="recommend-grid" id="recommendGrid"></div>
    </div>
  </div>

  <!-- 푸터 -->
  <footer id="footer">
    <div class="container">
      <h2>PLATE 맛집 추천</h2>
      <p>개발: 고등학교 2학년, 1학년 웹개발 프로젝트</p>
      <p>HTML, CSS, JS.</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/index.js"></script>
</body>

</html>
