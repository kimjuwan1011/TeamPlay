<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>찜 목록 - PLATE</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/bookmark.css">
  <script>
    const savedTheme = localStorage.getItem('teamplay_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>

<body>

  <!-- 헤더 -->
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path d="M7 2v20"></path>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"></path>
        </svg>
        PLATE
      </a>
      <div class="nav">
        <a href="index.html">홈</a>
        <a href="list.html">맛집 찾기</a>
        <a href="bookmark.html">찜 목록</a>
        <button id="themeToggle" class="theme-toggle" aria-label="다크모드 전환">
          <svg id="themeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
            fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>찜 목록</h1>
        <p>내가 저장한 맛집들을 확인하세요.</p>
      </div>
    </div>

    <section class="bookmark-section">
      <div class="container">
        <div id="bookmarkGrid" class="bookmark-grid"></div>

        <div id="emptyState" class="empty-state hidden">
          <h2>텅~ 비어있네요!</h2>
          <p>마음에 드는 맛집의 하트를 눌러 찜해보세요.</p>
          <a href="list.html" class="btn">맛집 찾으러 가기</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="footer">
    <div class="container">
      <h2>PLATE 맛집 추천</h2>
      <p>개발: 고등학교 2학년, 1학년 웹개발 프로젝트</p>
      <p>HTML, CSS, JS.</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/bookmark.js"></script>
