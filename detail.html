<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세 페이지 - PLATE</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/detail.css">
  <!-- 카카오맵 (기존 그대로 사용) -->
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e9ae8867dfd48ffbbcdedc1c3e52d562&autoload=false"></script>
  <script>
    const savedTheme = localStorage.getItem('teamplay_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>

<body>

  <!-- 헤더 -->
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path d="M7 2v20"></path>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"></path>
        </svg>
        PLATE
      </a>
      <div class="nav">
        <a href="index.html">홈</a>
        <a href="list.html">맛집 찾기</a>
        <a href="bookmark.html">찜 목록</a>
        <button id="themeToggle" class="theme-toggle" aria-label="다크모드 전환">
          <svg id="themeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
            fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="back-bar">
      <a href="list.html" class="btn">뒤로 가기</a>
    </div>

    <main id="detailMain">
      <!-- 히어로 이미지 -->
      <div class="detail-hero">
        <img id="detailHeroImg" src="" alt="맛집 이미지">
      </div>

      <div class="detail-layout">
        <!-- 왼쪽 내용 -->
        <div class="detail-content">
          <div class="detail-info-header">
            <span class="tag region" id="detailRegionTag"></span>
            <span class="tag category" id="detailCategoryTag"></span>
            <h1 id="detailName"></h1>
            <p>📍 <span id="detailAddress"></span></p>
          </div>

          <!-- 탭 버튼 -->
          <div class="tab-nav">
            <button class="tab-btn active" data-tab="menu">메뉴</button>
            <button class="tab-btn" data-tab="location">지도 보기</button>
            <button class="tab-btn" data-tab="review">리뷰 작성</button>
          </div>

          <!-- 탭 패널 -->
          <div class="tab-panel active" id="tab-menu">
            <div id="menuList"></div>
          </div>

          <div class="tab-panel" id="tab-location">
            <div id="map" class="map-container"></div>
            <div id="mapFallback" class="map-fallback">
              <p>지도를 불러올 수 없습니다.</p>
              <p id="mapFallbackAddr"></p>
              <a id="kakaoMapLink" href="#" target="_blank" class="btn">카카오맵에서 보기</a>
            </div>
            <p>📍 <span id="mapAddress"></span></p>
          </div>

          <div class="tab-panel" id="tab-review">
            <!-- 리뷰 폼 -->
            <form id="reviewForm" class="review-form">
              <h3>리뷰 남기기</h3>
              <div class="form-group">
                <label>닉네임</label>
                <input type="text" id="reviewNickname" required>
              </div>
              <div class="form-group">
                <label>별점</label>
                <div class="star-rating">
                  <input type="radio" name="rating" value="5" id="s5"><label for="s5">★</label>
                  <input type="radio" name="rating" value="4" id="s4"><label for="s4">★</label>
                  <input type="radio" name="rating" value="3" id="s3"><label for="s3">★</label>
                  <input type="radio" name="rating" value="2" id="s2"><label for="s2">★</label>
                  <input type="radio" name="rating" value="1" id="s1"><label for="s1">★</label>
                </div>
              </div>
              <div class="form-group">
                <label>내용</label>
                <textarea id="reviewContent" rows="4" required></textarea>
              </div>
              <button type="submit" class="btn">리뷰 등록</button>
            </form>

            <div id="reviewList" class="review-list"></div>
          </div>
        </div>

        <!-- 오른쪽 사이드바 -->
        <aside class="detail-sidebar">
          <div class="sidebar-card">
            <h3>가게 정보</h3>
            <p><strong>지역:</strong> <span id="sidebarRegion"></span></p>
            <p><strong>종류:</strong> <span id="sidebarCategory"></span></p>
            <p><strong>주소:</strong> <span id="sidebarAddress"></span></p>
            <p><strong>전화:</strong> <span id="sidebarPhone"></span></p>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <footer id="footer">
    <div class="container">
      <h2>PLATE 맛집 추천</h2>
      <p>개발: 고등학교 2학년, 1학년 웹개발 프로젝트</p>
      <p>HTML, CSS, JS</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/detail.js"></script>
  <script>
    if (typeof kakao !== 'undefined') {
      kakao.maps.load(onKakaoSDKLoad);
    }
  </script>
</body>

</html>
