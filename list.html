<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 찾기 - PLATE</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/list.css">
  <script>
    const savedTheme = localStorage.getItem('teamplay_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>

<body>

  <!-- 헤더 -->
  <header id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
          <path d="M7 2v20"></path>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"></path>
        </svg>
        PLATE
      </a>
      <div class="nav">
        <a href="index.html">홈</a>
        <a href="list.html">맛집 찾기</a>
        <a href="bookmark.html">찜 목록</a>
        <button id="themeToggle" class="theme-toggle" aria-label="다크모드 전환">
          <svg id="themeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
            fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>맛집 찾기</h1>
        <p>다양한 필터로 원하는 맛집을 찾아보세요!</p>
      </div>
    </div>

    <!-- 필터 영역 -->
    <div class="filter-area">
      <div class="container">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="검색어를 입력하세요 (예: 강남 맛집)">
          <button id="searchBtn" class="btn">검색</button>
          <button id="clearSearchBtn" class="btn btn-secondary">초기화</button>
        </div>

        <div class="filter-row">
          <span class="filter-label">지역:</span>
          <div class="filter-group">
            <button class="filter-btn active" data-region="all">전체</button>
            <button class="filter-btn" data-region="서울">서울</button>
            <button class="filter-btn" data-region="부산">부산</button>
            <button class="filter-btn" data-region="대구">대구</button>
            <button class="filter-btn" data-region="광주">광주</button>
            <button class="filter-btn" data-region="대전">대전</button>
            <button class="filter-btn" data-region="인천">인천</button>
            <button class="filter-btn" data-region="제주">제주</button>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-label">종류:</span>
          <div class="filter-group">
            <button class="filter-btn active" data-category="all">전체</button>
            <button class="filter-btn" data-category="한식">한식</button>
            <button class="filter-btn" data-category="중식">중식</button>
            <button class="filter-btn" data-category="일식">일식</button>
            <button class="filter-btn" data-category="양식">양식</button>
            <button class="filter-btn" data-category="기타">기타</button>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-label">별점:</span>
          <div class="filter-group">
            <button class="filter-btn active" data-rating="all">전체</button>
            <button class="filter-btn" data-rating="4.5">4.5 이상</button>
            <button class="filter-btn" data-rating="4.0">4.0 이상</button>
            <button class="filter-btn" data-rating="3.5">3.5 이상</button>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-label">정렬:</span>
          <div class="filter-group">
            <button class="filter-btn active" data-sort="default">기본순</button>
            <button class="filter-btn" data-sort="rating">별점 높은순</button>
            <button class="filter-btn" data-sort="name">이름순</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 리스트 영역 -->
    <section class="list-section">
      <div class="container">
        <p id="resultCount">검색 결과: <strong>0</strong>개</p>
        <span id="searchModeBadge" class="search-mode-badge">(API 검색 모드)</span>
        <div id="restaurant-grid" class="restaurant-grid"></div>
      </div>
    </section>
  </main>

  <footer id="footer">
    <div class="container">
      <h2>PLATE 맛집 추천</h2>
      <p>개발: 고등학교 2학년, 1학년 웹개발 프로젝트</p>
      <p>HTML, CSS, JS</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/list.js"></script>
</body>

</html>
